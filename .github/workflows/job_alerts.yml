name: Job Alerts

on:
  schedule:
    # EDT (UTC-4, active Mar–Nov): 6 AM, 12 PM, 5 PM ET
    # Next DST adjustment: Nov 1, 2026 — change to '0 11,17,22 * * *' for EST
    - cron: '0 10,16,21 * * *'
  workflow_dispatch:        # allow manual runs from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit seen_jobs.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Type check
        run: mypy domain/ application/ infrastructure/ main.py

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/e2e/

      - name: E2E fetcher health check
        continue-on-error: true
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
        run: pytest tests/e2e/ -v

      - name: Run job alerts
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          JSEARCH_API_KEY:  ${{ secrets.JSEARCH_API_KEY }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          FEEDBACK_PAT:   ${{ secrets.FEEDBACK_PAT }}
        run: python main.py

      - name: Inject reasons into feedback.html
        run: |
          python - <<'EOF'
          import json
          import yaml
          from pathlib import Path

          profile: dict = yaml.safe_load(Path("candidate_profile.yaml").read_text(encoding="utf-8"))
          up: str = json.dumps(profile["feedback_thumbs_up_reasons"])
          down: str = json.dumps(profile["feedback_thumbs_down_reasons"])
          template: str = Path("docs/feedback.html").read_text(encoding="utf-8")
          template = template.replace("__THUMBS_UP_REASONS__", up)
          template = template.replace("__THUMBS_DOWN_REASONS__", down)
          Path("docs/feedback.html").write_text(template, encoding="utf-8")
          EOF

      - name: Persist seen jobs
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f seen_jobs.json docs/feedback.html docs/emails/ jobs_debug.json resume.tex
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push

      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'EOF'
          import os, smtplib
          from email.mime.text import MIMEText
          host: str = os.environ["SMTP_HOST"]
          port: int = int(os.environ.get("SMTP_PORT", "587"))
          user: str = os.environ["SMTP_USER"]
          pw: str   = os.environ["SMTP_PASS"]
          to: str   = os.environ["EMAIL_TO"]
          url: str  = os.environ["RUN_URL"]
          msg = MIMEText(f"The Job Alert workflow failed.\n\nDetails: {url}")
          msg["Subject"] = "Job Alert Workflow FAILED"
          msg["From"] = user
          msg["To"] = to
          with smtplib.SMTP(host, port) as s:
              s.ehlo(); s.starttls(); s.login(user, pw)
              s.sendmail(user, to, msg.as_string())
          EOF
