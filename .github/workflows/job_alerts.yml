name: Job Alerts

on:
  schedule:
    # EDT (UTC-4, active Mar–Nov): 6 AM, 12 PM, 5 PM ET
    # Next DST adjustment: November 2026 — remove EDT entry, keep EST entry
    - cron: '0 10,16,21 * * *'
    # EST (UTC-5, active Nov–Mar): 6 AM, 12 PM, 5 PM ET (inactive during EDT)
    - cron: '0 11,17,22 * * *'
  workflow_dispatch:        # allow manual runs from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit seen_jobs.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Type check
        run: mypy domain/ application/ infrastructure/ main.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Run job alerts
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          JSEARCH_API_KEY:  ${{ secrets.JSEARCH_API_KEY }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Persist seen jobs
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
