name: Improve Job Rules

on:
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Claude Code to analyze and improve rules
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
          timeout_minutes: "15"
          direct_prompt: |
            You are an automated job-alert tuning agent for this repository.
            Your job: analyze the latest run's data and make targeted improvements
            to filtering and scoring rules so the email gets progressively better
            at surfacing relevant backend software engineering jobs.

            The candidate is Joshua Berger — a backend SWE (~2 years exp) specializing
            in Java, Spring Boot, and Kafka. See resume.tex for full context.

            ## Step 1: Read the data
            Read these files:
            - jobs_debug.json         (latest run: what qualified, filtered, scored, and why)
            - resume.tex              (candidate's actual background)
            - candidate_profile.yaml  (location/remote/salary prefs)
            - infrastructure/keyword_title_filter.py  (title reject list)
            - application/resume_profile_builder.py   (how skills become score weights)
            - BUSINESS_RULES.md       (rules you must not violate)
            - feedback.json           (vote history — tokens with |net_vote_score| >= 3 shift final scores; explains why some jobs score higher or lower than their breakdown suggests)

            ## Step 2: Identify specific issues
            Scan EVERY job in jobs_debug.json except those with result=duplicate.
            For each result category, look for the issues listed below.

            result=qualified — false positives:
            - Wrong role type for a backend SWE (non-SWE title category, wrong tech stack,
              irrelevant domain). These should have been filtered.

            result=filtered — false negatives or correct filters:
            - Jobs that look like genuine backend SWE roles that were incorrectly filtered.
              If a filter rule is too broad, narrow it.

            result=scored_out — borderline misses:
            - Jobs with llm_relevant=true that are genuinely good fits. Consider whether a
              scoring fix would surface them.

            Across all categories:
            - Tertiary skill noise — tokens adding 1 point that are substrings of other skills,
              overly generic, or not actually on the resume (e.g. 'api', 'rest' when 'rest apis'
               is already secondary)
            - Missing keyword filters for non-SWE role types that slipped through to qualified

            ## Step 3: Make surgical changes
            Only change what the evidence in jobs_debug.json clearly justifies.
            Allowed targets:
            - infrastructure/keyword_title_filter.py  → add/remove title fragments
            - candidate_profile.yaml                  → adjust minimum_salary only if justified
            - application/resume_profile_builder.py   → fix token extraction logic bugs

            Do NOT change:
            - preferred_locations, remote_allowed (user preferences, not tunable)
            - MINIMUM_SCORE in domain/scoring_policy.py
            - Skill weights (4/2/1 tier system)

            Be conservative — one clear fix is better than five speculative ones.

            If you find NO meaningful improvements, print "No improvements needed this run."
            and exit without creating a branch or PR.

            ## Step 4: Validate
            Run:
              python -m pytest tests/ -v --ignore=tests/e2e/
              python -m mypy domain/ application/ infrastructure/ main.py
            If either fails, revert your changes and exit without creating a PR.

            ## Step 5: Create or update the PR
            If you made changes and tests pass:
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git config user.name "github-actions[bot]"

              # Check for an existing open auto-improve PR
              EXISTING_PR=$(gh pr list --state open --json number,headRefName \
                --jq '.[] | select(.headRefName | startswith("auto/improve-rules-")) | .number' \
                | head -1)

              Stage only the files you changed (subset of):
                git add infrastructure/keyword_title_filter.py candidate_profile.yaml application/resume_profile_builder.py

              Write the PR body with actual evidence from jobs_debug.json — no
              bracketed placeholders. Use this exact format:

                # Auto: Improve Job Rules

                ## Summary
                - {What changed and why, citing specific job titles or IDs}
                - {Key reasoning behind each change}

                ## Changes
                | File | Change |
                |---|---|
                | `{path}` | {one-line description} |

                ## Validation
                All unit tests passing, mypy clean.

              Rules for the PR body:
              - Plain, technical tone — no marketing language
              - No "🤖 Generated with Claude Code" footer
              - Summary bullets explain *why*, not just *what*
              - Pass the body via a heredoc to avoid quoting issues

              if [ -n "$EXISTING_PR" ]; then
                BRANCH=$(gh pr view "$EXISTING_PR" --json headRefName --jq '.headRefName')
                git fetch origin "$BRANCH"
                git checkout "$BRANCH"
                git commit -m "auto: improve job rules based on latest run"
                git push origin "$BRANCH"
                gh pr edit "$EXISTING_PR" --body "$(cat <<'EOF'
            {actual body}
            EOF
            )"
              else
                BRANCH="auto/improve-rules-$(date +%Y%m%d-%H%M)"
                git checkout -b "$BRANCH"
                git commit -m "auto: improve job rules based on latest run"
                git push -u origin "$BRANCH"
                gh pr create \
                  --title "Auto: Improve Job Rules" \
                  --body "$(cat <<'EOF'
            {actual body}
            EOF
            )"
              fi
